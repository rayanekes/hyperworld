# ══════════════════════════════════════════════════════════
#  HYPERWORLD — Kitty Terminal "GHOST PROTOCOL" (Cybersec)
#  Palette: Matrix Green #00FF41 | Fond #000000 (pur)
# ══════════════════════════════════════════════════════════

# ── Police ─────────────────────────────────────────────────
font_family      Hack Nerd Font
bold_font        Hack Nerd Font Bold
italic_font      Hack Nerd Font Italic
font_size        12.5
disable_ligatures always

# ── Fenêtre ─────────────────────────────────────────────────
remember_window_size  no
initial_window_width  1200
initial_window_height 740
window_padding_width  14
window_padding_height 10
background_opacity    0.96
dynamic_background_opacity no

draw_minimal_borders yes
window_border_width  1pt
active_border_color  #00FF41
inactive_border_color #001100
bell_border_color    #FF3131

# ── Curseur ─────────────────────────────────────────────────
cursor            #00FF41
cursor_text_color #000000
cursor_shape      block
cursor_blink_interval 0.6
cursor_stop_blinking_after 0

# ── Sélection ───────────────────────────────────────────────
selection_foreground #000000
selection_background #00FF41

# ── Couleurs (palette GHOST PROTOCOL) ───────────────────────
background #000000
foreground #00FF41

# Noir
color0  #000000
color8  #003300

# Rouge (danger/alerte)
color1  #FF3131
color9  #FF6666

# Vert Matrix (principale)
color2  #00FF41
color10 #66FF88

# Jaune (warning)
color3  #CCCC00
color11 #FFFF00

# Bleu (secondaire)
color4  #004400
color12 #008800

# Magenta → violet sombre
color5  #330033
color13 #660066

# Cyan → vert pâle
color6  #00AA44
color14 #00FF88

# Blanc → blanc verdâtre
color7  #AAFFAA
color15 #CCFFCC

# ── Tabs ────────────────────────────────────────────────────
tab_bar_style            separator
tab_separator            " ┊ "
tab_bar_edge             top
tab_bar_background       #000000
active_tab_foreground    #000000
active_tab_background    #00FF41
active_tab_font_style    bold
inactive_tab_foreground  #004400
inactive_tab_background  #000000
tab_title_template       "{index}:{title[:18]}"

# ── URLs ────────────────────────────────────────────────────
url_color #00FF41
url_style underline

# ── Keybinds ────────────────────────────────────────────────
clear_all_shortcuts no
kitty_mod ctrl+shift

map kitty_mod+t      new_tab_with_cwd
map kitty_mod+w      close_tab
map kitty_mod+right  next_tab
map kitty_mod+left   previous_tab
map kitty_mod+plus   change_font_size all +1.0
map kitty_mod+minus  change_font_size all -1.0
map kitty_mod+0      change_font_size all 0

# ── Performance max ─────────────────────────────────────────
repaint_delay 8
input_delay   1
sync_to_monitor yes
