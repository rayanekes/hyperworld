# ══════════════════════════════════════════════════════════
#  HYPERWORLD — Kitty Terminal "CIRCUIT NOIR" (Gaming)
#  Palette: Magenta #FF006E | Cyan #00F5FF | Fond #080010
# ══════════════════════════════════════════════════════════

# ── Police ─────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        13.0
disable_ligatures never
force_ltr        no

# ── Fenêtre ─────────────────────────────────────────────────
remember_window_size  no
initial_window_width  1100
initial_window_height 680
window_padding_width  16
window_padding_height 12
background_opacity    0.87
dynamic_background_opacity yes

# Bords arrondis (via allow_remote_control)
draw_minimal_borders yes
window_border_width  1.5pt
active_border_color  #00F5FF
inactive_border_color #1a0030
bell_border_color    #FF006E

# ── Curseur ─────────────────────────────────────────────────
cursor            #00F5FF
cursor_text_color #080010
cursor_shape      block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# ── Sélection ───────────────────────────────────────────────
selection_foreground #080010
selection_background #00F5FF

# ── Couleurs (palette CIRCUIT NOIR) ─────────────────────────
# Fond
background #080010
foreground #00F5FF

# Noir
color0  #0d001a
color8  #1a0030

# Rouge → Magenta
color1  #FF006E
color9  #FF4499

# Vert → Teal
color2  #00D4AA
color10 #00FFCC

# Jaune → Or néon
color3  #FFB347
color11 #FFD700

# Bleu → Cyan électrique
color4  #0080FF
color12 #00F5FF

# Magenta → Violet néon
color5  #7B2FFF
color13 #A855F7

# Cyan → Turquoise
color6  #00D4FF
color14 #7FFFEF

# Blanc → Blanc bleuté
color7  #C0E0FF
color15 #E8F4FF

# ── Tabs ────────────────────────────────────────────────────
tab_bar_style            powerline
tab_powerline_style      round
tab_bar_edge             bottom
tab_bar_background       #080010
active_tab_foreground    #080010
active_tab_background    #00F5FF
active_tab_font_style    bold
inactive_tab_foreground  #004455
inactive_tab_background  #0a0020
inactive_tab_font_style  normal
tab_title_template       "{fmt.fg.default} {index}: {title[:20]}{fmt.fg.default}"

# ── URLs ────────────────────────────────────────────────────
url_color #00F5FF
url_style curly
open_url_with default

# ── Keybinds Kitty ──────────────────────────────────────────
clear_all_shortcuts no
kitty_mod ctrl+shift

map kitty_mod+t      new_tab_with_cwd
map kitty_mod+w      close_tab
map kitty_mod+right  next_tab
map kitty_mod+left   previous_tab
map kitty_mod+plus   change_font_size all +1.0
map kitty_mod+minus  change_font_size all -1.0
map kitty_mod+0      change_font_size all 0

# ── Performance ─────────────────────────────────────────────
repaint_delay     8
input_delay       1
sync_to_monitor   yes
