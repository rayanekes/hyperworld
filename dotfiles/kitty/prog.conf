# ══════════════════════════════════════════════════════════
#  HYPERWORLD — Kitty Terminal "DEEP SPACE IDE" (Prog)
#  Palette: Bleu #1E3A5F | Lavande #A78BFA | Fond #0D1117
# ══════════════════════════════════════════════════════════

# ── Police ─────────────────────────────────────────────────
font_family      CaskaydiaCove Nerd Font
bold_font        CaskaydiaCove Nerd Font Bold
italic_font      CaskaydiaCove Nerd Font Italic
font_size        13.5
disable_ligatures never

# Fallback si CaskaydiaCove absent
# font_family JetBrainsMono Nerd Font

# ── Fenêtre ─────────────────────────────────────────────────
remember_window_size  no
initial_window_width  1280
initial_window_height 800
window_padding_width  20
window_padding_height 14
background_opacity    0.89
dynamic_background_opacity yes

draw_minimal_borders yes
window_border_width  1.5pt
active_border_color  #A78BFA
inactive_border_color #1E2030
bell_border_color    #FF8C42

# ── Curseur ─────────────────────────────────────────────────
cursor            #A78BFA
cursor_text_color #0D1117
cursor_shape      beam
cursor_beam_thickness 2.0
cursor_blink_interval 0.4
cursor_stop_blinking_after 8.0

# ── Sélection ───────────────────────────────────────────────
selection_foreground #0D1117
selection_background #A78BFA

# ── Couleurs (palette DEEP SPACE IDE) ───────────────────────
background #0D1117
foreground #E6EDF3

# Noir
color0  #21262D
color8  #484F58

# Rouge → Corail doux
color1  #FF7B72
color9  #FFA198

# Vert → Jade
color2  #3FB950
color10 #56D364

# Jaune → Or
color3  #D29922
color11 #E3B341

# Bleu → Bleu royal
color4  #388BFD
color12 #79C0FF

# Magenta → Lavande
color5  #A78BFA
color13 #C084FC

# Cyan → Teal
color6  #2DD4BF
color14 #5EEAD4

# Blanc → Blanc doux
color7  #B1BAC4
color15 #E6EDF3

# ── Tabs (élégants) ─────────────────────────────────────────
tab_bar_style            powerline
tab_powerline_style      round
tab_bar_edge             top
tab_bar_background       #0D1117
active_tab_foreground    #0D1117
active_tab_background    #A78BFA
active_tab_font_style    bold
inactive_tab_foreground  #484F58
inactive_tab_background  #161B22
tab_title_template       " {index}: {title[:22]} "
tab_bar_margin_width     8
tab_bar_margin_height    4 0

# ── URLs ────────────────────────────────────────────────────
url_color #2DD4BF
url_style curly
open_url_with default

# ── Prompt ──────────────────────────────────────────────────
# Le prompt est géré par starship — aucune config kitty requise

# ── Keybinds ────────────────────────────────────────────────
clear_all_shortcuts no
kitty_mod ctrl+shift

map kitty_mod+t      new_tab_with_cwd
map kitty_mod+w      close_tab
map kitty_mod+right  next_tab
map kitty_mod+left   previous_tab
map kitty_mod+enter  new_window_with_cwd
map kitty_mod+plus   change_font_size all +1.0
map kitty_mod+minus  change_font_size all -1.0
map kitty_mod+0      change_font_size all 0

# Layout fenêtres
map kitty_mod+l      next_layout

# ── Layouts actifs ───────────────────────────────────────────
enabled_layouts tall,horizontal,grid,stack

# ── Performance ─────────────────────────────────────────────
repaint_delay     8
input_delay       1
sync_to_monitor   yes
