# ══════════════════════════════════════════════════════════
#  HYPERWORLD — active_world.conf (fichier dynamique)
#  Ce fichier est remplacé par un symlink vers le monde actif
#  par world-switch.sh
#
#  Par défaut : Monde PROG "DEEP SPACE IDE"
#  Remplacé dynamiquement lors de chaque changement de monde
# ══════════════════════════════════════════════════════════

# Source : monde Prog par défaut au boot
# world-switch.sh remplace ce fichier par le bon monde

general {
    col.active_border   = rgba(A78BFAFF) rgba(2DD4BFFF) 135deg
    col.inactive_border = rgba(1E202888)
    gaps_in  = 6
    gaps_out = 14
}

decoration {
    rounding = 14
    active_opacity   = 1.0
    inactive_opacity = 0.93
    shadow_color = rgba(A78BFA44)
    shadow_range = 20
    shadow_render_power = 3

    blur {
        enabled = true
        size = 9
        passes = 3
        vibrancy = 0.2
        noise = 0.01
        brightness = 0.82
    }
}

animations {
    animation = windows,     1, 4, overshoot, slide
    animation = workspaces,  1, 5, cinematic, slidevert
    animation = layers,      1, 4, smooth, slide
}
