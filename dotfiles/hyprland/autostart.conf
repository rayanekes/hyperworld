# ══════════════════════════════════════════════════════════
#  HYPERWORLD — autostart.conf
#  Tout ce qui démarre avec Hyprland
# ══════════════════════════════════════════════════════════

# ── Wallpaper daemon ───────────────────────────────────────
exec-once = swww-daemon --no-cache

# ── Fond d'écran par défaut (monde Prog au boot) ───────────
exec-once = sleep 0.5 && swww img ~/hyperworld/dotfiles/wallpapers/prog.jpg \
    --transition-type fade --transition-duration 1.2 --transition-fps 144

# ── Bar système ────────────────────────────────────────────
exec-once = waybar

# ── Notifications ──────────────────────────────────────────
exec-once = swaync

# ── Polkit (fenêtres d'authentification graphiques) ────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Clipboard manager ──────────────────────────────────────
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── XDG portail (requis pour partage écran, screenshots) ───
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Gestion énergie ────────────────────────────────────────
exec-once = sleep 2 && ~/.local/bin/power-monitor.sh

# ── AXIOM (si sous secteur) ────────────────────────────────
# Le power-monitor s'en charge automatiquement
# Invocation manuelle : Super+A

# ── Keyring (mots de passe applications) ───────────────────
exec-once = gnome-keyring-daemon --start --components=secrets

# ── Bluetooth (tray) ───────────────────────────────────────
exec-once = sleep 3 && blueman-applet

# ── NetworkManager (tray) ──────────────────────────────────
exec-once = nm-applet --indicator

# ── Idle management ────────────────────────────────────────
exec-once = hypridle

# ── Cursor (pour les apps XWayland) ────────────────────────
exec-once = hyprctl setcursor Bibata-Modern-Classic 24
