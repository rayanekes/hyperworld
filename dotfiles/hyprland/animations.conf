# ══════════════════════════════════════════════════════════
#  HYPERWORLD — animations.conf
#  Animations rapides, éclatantes, jamais lourdes
# ══════════════════════════════════════════════════════════

animations {
    enabled = true

    # ── Courbes de Bézier custom ───────────────────────────
    # overshoot : légère élasticité premium
    bezier = overshoot,   0.05, 0.9, 0.1, 1.05
    # cinematic : entrée rapide, sortie douce
    bezier = cinematic,   0.4, 0.0, 0.2, 1.0
    # snap : très rapide, coupé net
    bezier = snap,        0.1, 1.0, 0.1, 1.0
    # smooth : courbe standard améliorée
    bezier = smooth,      0.25, 0.1, 0.25, 1.0
    # expo : départ explosif, fin douce
    bezier = expo,        0.16, 1, 0.3, 1

    # ── Fenêtres ───────────────────────────────────────────
    # Ouverture : slide depuis bas + overshoot
    animation = windows,           1, 4,  overshoot, slide
    # Fermeture : fade rapide
    animation = windowsOut,        1, 3,  smooth,    slide
    animation = windowsMove,       1, 3,  snap

    # ── Fade ───────────────────────────────────────────────
    animation = fadeIn,            1, 3,  smooth
    animation = fadeOut,           1, 2,  smooth
    animation = fadeSwitch,        1, 3,  smooth
    animation = fadeShadow,        1, 3,  smooth
    animation = fadeDim,           1, 3,  smooth
    animation = fadeLayersIn,      1, 3,  smooth
    animation = fadeLayersOut,     1, 3,  smooth

    # ── Workspaces (changement dans un monde) ─────────────
    # Glissement horizontal rapide
    animation = workspaces,        1, 4,  cinematic, slide

    # ── Layers (waybar, rofi, swaync) ─────────────────────
    animation = layers,            1, 3,  smooth,    slide
    animation = layersIn,          1, 4,  overshoot, slide
    animation = layersOut,         1, 2,  smooth,    fade

    # ── Special workspace ──────────────────────────────────
    animation = specialWorkspace,  1, 4,  overshoot, slide
}
