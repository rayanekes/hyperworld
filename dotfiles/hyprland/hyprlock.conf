# ══════════════════════════════════════════════════════════
#  HYPERWORLD — hyprlock.conf
#  Écran de verrouillage premium
#  Style : Deep Space, fond sombre + horloge flottante
# ══════════════════════════════════════════════════════════

# ── Général ───────────────────────────────────────────────
general {
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
    ignore_empty_input  = false
    disable_loading_bar = false
}

# ── Fond d'écran (flou intense) ───────────────────────────
background {
    monitor  =
    path     = ~/.config/hypr/lockscreen.jpg
    # Fallback si pas d'image
    color    = rgba(0d1117FF)

    blur_size    = 12
    blur_passes  = 4
    noise        = 0.0117
    contrast     = 0.88
    brightness   = 0.55
    vibrancy     = 0.2
    vibrancy_darkness = 0.1
}

# ── Horloge (grande, centrale) ────────────────────────────
label {
    monitor  =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(E6EDF3FF)
    font_size    = 96
    font_family  = "Orbitron Bold"
    shadow_passes   = 3
    shadow_size     = 8
    shadow_color    = rgba(000000AA)
    shadow_boost    = 1.2

    position = 0, 120
    halign   = center
    valign   = center
}

# ── Date ──────────────────────────────────────────────────
label {
    monitor  =
    text     = cmd[update:60000] echo "$(date '+%A %d %B %Y')"
    color    = rgba(A78BFACC)
    font_size    = 18
    font_family  = "Inter Medium"
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(000000AA)

    position = 0, 56
    halign   = center
    valign   = center
}

# ── Champ de saisie du mot de passe ───────────────────────
input-field {
    monitor  =
    size     = 300, 52
    outline_thickness = 2
    dots_size      = 0.28
    dots_spacing   = 0.18
    dots_center    = true
    dots_rounding  = -1

    outer_color  = rgba(A78BFA88)
    inner_color  = rgba(0D111788)
    font_color   = rgba(E6EDF3FF)
    fade_on_empty = true
    placeholder_text = <i><span foreground="##A78BFA">Mot de passe...</span></i>
    hide_input   = false
    rounding     = 14

    check_color  = rgba(2DD4BFFF)
    fail_color   = rgba(FF006EFF)
    fail_text    = <i>$ATTEMPTS tentatives</i>
    fail_transition = 300

    position = 0, -80
    halign   = center
    valign   = center
}

# ── Label utilisateur ─────────────────────────────────────
label {
    monitor  =
    text     = $USER
    color    = rgba(A78BFAAA)
    font_size    = 14
    font_family  = "Inter SemiBold"
    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(000000AA)

    position = 0, -28
    halign   = center
    valign   = center
}

# ── Infos système (coin bas gauche) ───────────────────────
label {
    monitor  =
    text     = cmd[update:5000] echo "  $(sensors 2>/dev/null | grep 'Package id 0' | awk '{print $4}' || echo '?')   $(free -h | awk '/^Mem/{print $3\"/\"$2}')"
    color    = rgba(CDD9E566)
    font_size    = 11
    font_family  = "JetBrains Mono"
    shadow_passes = 1
    shadow_color  = rgba(00000088)

    position = 24, -24
    halign   = left
    valign   = bottom
}

# ── HYPERWORLD label (coin bas droite) ────────────────────
label {
    monitor  =
    text     = HYPERWORLD
    color    = rgba(A78BFA44)
    font_size    = 11
    font_family  = "Orbitron"
    shadow_passes = 0

    position = -24, -24
    halign   = right
    valign   = bottom
}
