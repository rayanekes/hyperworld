# ══════════════════════════════════════════════════════════
#  HYPERWORLD — hypridle.conf
#  Gestion intelligente de l'inactivité
#  Différent selon secteur / batterie
# ══════════════════════════════════════════════════════════

general {
    lock_cmd         = pidof hyprlock || hyprlock
    unlock_cmd       = notify-send "HYPERWORLD" "Session déverrouillée" --urgency=low
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# ── 2min : Réduire luminosité (batterie) ──────────────────
listener {
    timeout  = 120
    on-timeout  = brightnessctl -s set 30%
    on-resume   = brightnessctl -r
}

# ── 5min : Verrouiller l'écran ────────────────────────────
listener {
    timeout  = 300
    on-timeout  = loginctl lock-session
}

# ── 5.5min : Éteindre l'écran après lock ─────────────────
listener {
    timeout  = 330
    on-timeout  = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on && brightnessctl -r
}

# ── 15min : Suspension (sur batterie uniquement) ──────────
# Activé seulement si débranché — géré par power-monitor.sh
# listener {
#     timeout  = 900
#     on-timeout  = systemctl suspend
# }
