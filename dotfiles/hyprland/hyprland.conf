# ╔══════════════════════════════════════════════════════════╗
# ║         HYPERWORLD — hyprland.conf (Principal)          ║
# ║    Config de base + include des modules dynamiques      ║
# ╚══════════════════════════════════════════════════════════╝

# ── Inclusions ────────────────────────────────────────────
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/windowrules.conf
# Le monde actif est sourcé dynamiquement par world-switch.sh
source = ~/.config/hypr/active_world.conf

# ── Moniteur ──────────────────────────────────────────────
# FX507ZU4 : 1920x1080 @ 144Hz — écran interne
monitor = eDP-1, 1920x1080@144, 0x0, 1

# ── Général ───────────────────────────────────────────────
general {
    gaps_in  = 6
    gaps_out = 14
    border_size = 2
    col.active_border   = rgba(00F5FFFF) rgba(7B2FFFFF) 45deg
    col.inactive_border = rgba(1a1a2eAA)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 10
    hover_icon_on_border = true
    allow_tearing = false
}

# ── Décoration (fenêtres) ─────────────────────────────────
decoration {
    rounding = 14
    active_opacity   = 1.0
    inactive_opacity = 0.94
    fullscreen_opacity = 1.0

    drop_shadow = true
    shadow_range = 24
    shadow_render_power = 3
    shadow_color = rgba(000000BB)
    shadow_offset = 2 4
    shadow_scale = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.01
        contrast = 0.9
        brightness = 0.8
        vibrancy = 0.2
        vibrancy_darkness = 0.0
        special = true
        popups = true
    }
}

# ── Input ─────────────────────────────────────────────────
input {
    kb_layout = fr
    kb_variant = azerty
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0.0
    touchpad {
        natural_scroll = true
        tap-to-click = true
        drag_lock = false
        middle_button_emulation = false
    }
}

# ── Gestures (touchpad) ───────────────────────────────────
gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 250
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = false
}

# ── Layout Dwindle ────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
    smart_resizing = true
}

# ── Misc ──────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 1
    focus_on_activate = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ── XWayland ──────────────────────────────────────────────
xwayland {
    force_zero_scaling = true
    use_nearest_neighbor = false
}

# ── Workspaces 1-9 (3 mondes x 3 workspaces) ─────────────
# Gaming  : 1, 2, 3
# Cybersec: 4, 5, 6
# Prog    : 7, 8, 9

workspace = 1, persistent:true, default:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true
