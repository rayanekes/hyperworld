# ══════════════════════════════════════════════════════════
#  HYPERWORLD — keybinds.conf
#  Tous les raccourcis clavier du système
# ══════════════════════════════════════════════════════════

$mod = SUPER
$scripts = ~/.local/bin

# ── Changement de Monde (avec animations) ─────────────────
bind = $mod, F1, exec, $scripts/world-switch.sh gaming
bind = $mod, F2, exec, $scripts/world-switch.sh cybersec
bind = $mod, F3, exec, $scripts/world-switch.sh prog

# ── HYPERBOARD (touche Super seule) ───────────────────────
bind = $mod, Super_L, exec, $scripts/hyperboard-launch.sh
# Vue globale rapide (Rofi fallback)
bind = $mod SHIFT, Super_L, exec, $scripts/global-overview.sh

# ── AXIOM ─────────────────────────────────────────────────
bind = $mod, A, exec, $scripts/axiom-launch.sh

# ── Apps essentielles ─────────────────────────────────────
bind = $mod, T,     exec, kitty
bind = $mod, B,     exec, firefox
bind = $mod, E,     exec, thunar
bind = $mod, code,  exec, rofi -show drun -theme ~/.config/rofi/world-launcher.rasi

# ── Gestion des fenêtres ──────────────────────────────────
bind = $mod,       Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod,       F, fullscreen, 0
bind = $mod SHIFT, F, fullscreen, 1
bind = $mod,       V, togglefloating
bind = $mod,       P, pseudo
bind = $mod,       J, togglesplit

# ── Focus fenêtres ────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Déplacer fenêtres ─────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Redimensionner ────────────────────────────────────────
binde = $mod CTRL, right, resizeactive,  30 0
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, up,    resizeactive,  0 -30
binde = $mod CTRL, down,  resizeactive,  0  30

# ── Workspaces dans le monde Gaming (1-3) ─────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3

# ── Workspaces dans le monde Cybersec (4-6) ───────────────
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

# ── Workspaces dans le monde Prog (7-9) ───────────────────
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# ── Déplacer fenêtre vers workspace ───────────────────────
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# ── Souris ────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bind  = $mod, mouse_down, workspace, e+1
bind  = $mod, mouse_up,   workspace, e-1

# ── Contrôles media (Spotify + playerctl) ─────────────────
bindl  =, XF86AudioPlay,        exec, playerctl play-pause
bindl  =, XF86AudioPrev,        exec, playerctl previous
bindl  =, XF86AudioNext,        exec, playerctl next
bindl  =, XF86AudioStop,        exec, playerctl stop

# ── Volume ────────────────────────────────────────────────
bindel =, XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel =, XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  =, XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# ── Luminosité ────────────────────────────────────────────
bindel =, XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindel =, XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshots (script unifié) ───────────────────────────
bind = ,          Print, exec, $scripts/screenshot.sh area      # Zone + annotation swappy
bind = SHIFT,     Print, exec, $scripts/screenshot.sh full      # Écran entier + annotation
bind = $mod,      Print, exec, $scripts/screenshot.sh copy      # Zone → presse-papier (rapide)
bind = CTRL,      Print, exec, $scripts/screenshot.sh window    # Fenêtre active seulement
bind = $mod ALT,  Print, exec, $scripts/screenshot.sh gallery   # Galerie fzf des screenshots

# ── Notifications ─────────────────────────────────────────
bind = $mod SHIFT, N, exec, swaync-client -t

# ── Clipboard ─────────────────────────────────────────────
bind = $mod, C, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# ── Verrou d'écran ────────────────────────────────────────
bind = $mod, X, exec, hyprlock
