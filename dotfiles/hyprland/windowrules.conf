# ══════════════════════════════════════════════════════════
#  HYPERWORLD — windowrules.conf
#  Isolation des apps par monde + règles visuelles
# ══════════════════════════════════════════════════════════

# ═══ MONDE GAMING — Workspaces 1, 2, 3 ════════════════════
windowrulev2 = workspace 1 silent, class:^(steam)$
windowrulev2 = workspace 1 silent, class:^(steam_app.*)$
windowrulev2 = workspace 1 silent, class:^(gamescope)$
windowrulev2 = workspace 2 silent, class:^(lutris)$
windowrulev2 = workspace 2 silent, class:^(bottles)$
windowrulev2 = workspace 2 silent, class:^(heroic)$
windowrulev2 = workspace 3 silent, class:^(discord)$
windowrulev2 = workspace 3 silent, title:^(Discord)$

# ═══ MONDE CYBERSEC — Workspaces 4, 5, 6 ══════════════════
windowrulev2 = workspace 4 silent, class:^(wireshark)$
windowrulev2 = workspace 4 silent, class:^(Wireshark)$
windowrulev2 = workspace 4 silent, title:^(msfconsole)(.*)$
windowrulev2 = workspace 4 silent, class:^(burpsuite)$
windowrulev2 = workspace 5 silent, class:^(firefox)$, title:^(.*OSINT.*)$
windowrulev2 = workspace 5 silent, class:^(tor-browser)$
windowrulev2 = workspace 6 silent, title:^(.*Ghidra.*)$
windowrulev2 = workspace 6 silent, class:^(radare2)$
windowrulev2 = workspace 6 silent, class:^(Cutter)$

# ═══ MONDE PROG — Workspaces 7, 8, 9 ══════════════════════
windowrulev2 = workspace 7 silent, class:^(Code)$
windowrulev2 = workspace 7 silent, class:^(code-oss)$
windowrulev2 = workspace 7 silent, title:^(.*VSCode.*)$
windowrulev2 = workspace 7 silent, class:^(arduino-ide)$
windowrulev2 = workspace 8 silent, title:^(.*LazyGit.*)$
windowrulev2 = workspace 8 silent, title:^(.*JupyterLab.*)$
windowrulev2 = workspace 9 silent, class:^(com.spotify.client)$
windowrulev2 = workspace 9 silent, class:^(Spotify)$
windowrulev2 = workspace 9 silent, class:^(postman)$

# ═══ RÈGLES VISUELLES ══════════════════════════════════════

# Fenêtres flottantes
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(axiom-terminal)$

# AXIOM terminal — centré, taille fixe
windowrulev2 = float,   class:^(axiom-terminal)$
windowrulev2 = size 900 600, class:^(axiom-terminal)$
windowrulev2 = center,  class:^(axiom-terminal)$
windowrulev2 = animation slide, class:^(axiom-terminal)$

# Steam en fullscreen sans décoration
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = nodim,      class:^(steam_app_.*)$
windowrulev2 = immediate,  class:^(steam_app_.*)$

# Désactiver blur sur les terminaux cybersec (lisibilité)
windowrulev2 = noblur, class:^(kitty)$, workspace:4
windowrulev2 = noblur, class:^(kitty)$, workspace:5
windowrulev2 = noblur, class:^(kitty)$, workspace:6

# Opacité différente par monde
windowrulev2 = opacity 0.90, class:^(kitty)$, workspace:7
windowrulev2 = opacity 0.92, class:^(kitty)$, workspace:8

# Idle inhibit pour les jeux
windowrulev2 = idleinhibit fullscreen, class:^(steam_app_.*)$
windowrulev2 = idleinhibit focus,      class:^(mpv)$
