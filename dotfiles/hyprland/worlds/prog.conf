# ══════════════════════════════════════════════════════════
#  HYPERWORLD — active_world.conf (MONDE PROG)
#  "DEEP SPACE IDE" — Lavande + Teal + Bleu profond
#  Activé par : world-switch.sh prog
#  C'est le monde par défaut au boot
# ══════════════════════════════════════════════════════════

# ── Couleurs de bordures ───────────────────────────────────
general {
    col.active_border   = rgba(A78BFAFF) rgba(2DD4BFFF) 135deg
    col.inactive_border = rgba(1E202888)
    gaps_in  = 6
    gaps_out = 14
}

# ── Décoration Prog (premium, glassmorphism maximal) ───────
decoration {
    rounding = 14
    active_opacity   = 1.0
    inactive_opacity = 0.93

    shadow_color = rgba(A78BFA44)
    shadow_range = 20
    shadow_render_power = 3
    shadow_offset = 0 4

    blur {
        enabled = true
        size = 9
        passes = 3
        vibrancy = 0.2
        vibrancy_darkness = 0.0
        noise = 0.01
        contrast = 0.9
        brightness = 0.82
        special = true
        popups = true
    }
}

# ── Animations Prog (fluides, premium) ─────────────────────
animations {
    animation = windows,     1, 4, overshoot, slide
    animation = workspaces,  1, 5, cinematic, slidevert
    animation = layers,      1, 4, smooth, slide
    animation = fadeIn,      1, 4, smooth
    animation = fadeOut,     1, 3, smooth
}
