# ══════════════════════════════════════════════════════════
#  HYPERWORLD — active_world.conf (MONDE GAMING)
#  "CIRCUIT NOIR" — Magenta + Cyan + Violet
#  Activé par : world-switch.sh gaming
# ══════════════════════════════════════════════════════════

# ── Couleurs de bordures ───────────────────────────────────
general {
    col.active_border   = rgba(FF006EFF) rgba(00F5FFFF) rgba(7B2FFFFF) 60deg
    col.inactive_border = rgba(1a0030AA)
    gaps_in  = 5
    gaps_out = 12
}

# ── Décoration spécifique Gaming ───────────────────────────
decoration {
    rounding = 12
    active_opacity   = 1.0
    inactive_opacity = 0.92

    shadow_color = rgba(FF006E66)
    shadow_range = 28
    shadow_render_power = 4

    blur {
        enabled = true
        size = 10
        passes = 3
        vibrancy = 0.3
        vibrancy_darkness = 0.0
        noise = 0.008
    }
}

# ── Animations Gaming (plus dynamiques) ────────────────────
animations {
    animation = windows,     1, 3, overshoot, slide
    animation = workspaces,  1, 3, cinematic, slide
    animation = layers,      1, 3, smooth, slide
}
