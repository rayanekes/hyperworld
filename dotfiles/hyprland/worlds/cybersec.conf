# ══════════════════════════════════════════════════════════
#  HYPERWORLD — active_world.conf (MONDE CYBERSEC)
#  "GHOST PROTOCOL" — Vert Matrix + Rouge danger
#  Activé par : world-switch.sh cybersec
# ══════════════════════════════════════════════════════════

# ── Couleurs de bordures ───────────────────────────────────
general {
    col.active_border   = rgba(00FF41FF) rgba(003300FF) 45deg
    col.inactive_border = rgba(001100AA)
    gaps_in  = 4
    gaps_out = 10
}

# ── Décoration Cybersec (plus sobre, focus lisibilité) ─────
decoration {
    rounding = 6
    active_opacity   = 1.0
    inactive_opacity = 0.95

    shadow_color = rgba(00FF4133)
    shadow_range = 16
    shadow_render_power = 2

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.1
        noise = 0.02
    }
}

# ── Animations Cybersec (plus sèches, rapides) ─────────────
animations {
    animation = windows,     1, 2, snap, slide
    animation = workspaces,  1, 2, snap, slide
    animation = layers,      1, 2, smooth, fade
}
