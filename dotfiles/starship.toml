# ══════════════════════════════════════════════════════════
#  HYPERWORLD — starship.toml
#  Prompt universel pour ZSH (et tout shell)
#  Style adaptatif selon le monde actif
# ══════════════════════════════════════════════════════════

# Format global du prompt
format = """
$username\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# Prompt de droite (infos rapides)
right_format = """$battery$time"""

# Délai avant d'afficher le prompt (ms)
command_timeout = 2000
scan_timeout    = 30
add_newline     = true

# ── Caractère de prompt ───────────────────────────────────
[character]
success_symbol = "[❯](bold #A78BFA)"
error_symbol   = "[❯](bold #FF006E)"
vimcmd_symbol  = "[❮](bold #2DD4BF)"

# ── Utilisateur ───────────────────────────────────────────
[username]
style_user  = "bold #A78BFA"
style_root  = "bold #FF006E"
format      = "[$user]($style) "
show_always = false           # n'affiche que si root ou SSH

# ── Répertoire ────────────────────────────────────────────
[directory]
style            = "bold #2DD4BF"
format           = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo  = true
read_only        = " 󰌾"
read_only_style  = "#FF8C42"
home_symbol      = "~"

[directory.substitutions]
"~/P4 projetcts$"   = "⚡P4"
"~/hyperworld"      = "🌌HW"
"~/.axiom"          = "🤖AXIOM"
"~/Documents"       = "📄Docs"

# ── Git branche ───────────────────────────────────────────
[git_branch]
symbol     = " "
style      = "#FF8C42"
format     = "[$symbol$branch]($style) "
truncation_length = 18
truncation_symbol = "…"
always_show_remote = false

# ── Git status ────────────────────────────────────────────
[git_status]
style           = "#A78BFA"
format          = "([$all_status$ahead_behind]($style) )"
conflicted      = "⚡"
ahead           = "⇡${count}"
behind          = "⇣${count}"
diverged        = "⇕⇡${ahead_count}⇣${behind_count}"
untracked       = "?${count}"
stashed         = "󰆔"
modified        = "!${count}"
staged          = "+${count}"
renamed         = "»${count}"
deleted         = "✘${count}"

# ── Python ────────────────────────────────────────────────
[python]
symbol  = " "
style   = "#2DD4BF"
format  = "[$symbol$pyenv_prefix($version )(\\($virtualenv\\) )]($style)"
detect_extensions = ["py"]
detect_files      = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]

# ── Node.js ───────────────────────────────────────────────
[nodejs]
symbol  = " "
style   = "#3FB950"
format  = "[$symbol($version )]($style)"
detect_extensions = ["js", "ts", "jsx", "tsx", "mjs"]
detect_files      = ["package.json", ".nvmrc"]

# ── Rust ─────────────────────────────────────────────────
[rust]
symbol = " "
style  = "#FF8C42"
format = "[$symbol($version )]($style)"

# ── Docker ───────────────────────────────────────────────
[docker_context]
symbol = " "
style  = "#388BFD"
format = "[$symbol$context]($style) "
only_with_files = true

# ── Durée de commande ─────────────────────────────────────
[cmd_duration]
min_time    = 2000            # affiche si commande > 2s
style       = "#484F58"
format      = "[⏱ $duration]($style) "
show_milliseconds = false

# ── Batterie (prompt droit) ───────────────────────────────
[battery]
full_symbol        = "󰁹"
charging_symbol    = "󰂄"
discharging_symbol = "󰂃"
unknown_symbol     = "󰁻"
empty_symbol       = "󰁺"
format             = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 20
style     = "bold #FF006E"
[[battery.display]]
threshold = 50
style     = "#FF8C42"
[[battery.display]]
threshold = 100
style     = "#484F58"

# ── Heure (prompt droit) ─────────────────────────────────
[time]
disabled      = false
time_format   = "%H:%M"
style         = "#484F58"
format        = "[$time]($style)"

# ── Modules désactivés (pour légèreté) ────────────────────
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true
